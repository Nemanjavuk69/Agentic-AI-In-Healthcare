<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxonomy Engine - DEMO MODE</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // MOCK DATA for demo
    const MOCK_TAXONOMY = {
      "name": "Research Taxonomy",
      "children": [
        {
          "name": "Agentic AI Systems & Architecture",
          "size": 3,
          "papers": [
            {"doi": "10.13052/jwe1540-9589.2511", "title": "Agentic AI Service Architecture Based on SOA", "authors": "D. B. Choi, Y. Kang, Y. B. Park", "year": "2026"},
            {"doi": "10.1109/ACCESS.2025.3590264", "title": "Agentic AI Systems: Architecture and Evaluation", "authors": "A. Khamis", "year": "2025"},
            {"doi": "10.1109/ACCESS.2026.3662282", "title": "Agentic AI With Orchestrator-Agent Trust", "authors": "K. I. Roumeliotis et al.", "year": "2026"}
          ]
        },
        {
          "name": "Human-AI Interaction & Adoption",
          "size": 2,
          "papers": [
            {"doi": "10.1109/ACCESS.2026.3665348", "title": "Agentic AI Arrives: How Gen Z Adopts Autonomous AI Agents", "authors": "M. Hasselwander, O. Lah", "year": "2026"},
            {"doi": "10.1109/ACCESS.2025.3532853", "title": "Agentic AI: Autonomous Intelligence for Complex Goals", "authors": "D. B. Acharya et al.", "year": "2025"}
          ]
        },
        {
          "name": "Enterprise & Business Applications",
          "size": 1,
          "papers": [
            {"doi": "10.1109/ACCESS.2025.3621887", "title": "Implementing Agentic AI Into ERP Software", "authors": "S. Sarferaz", "year": "2025"}
          ]
        },
        {
          "name": "Domain-Specific Applications",
          "size": 1,
          "papers": [
            {"doi": "10.1109/ACCESS.2026.3654529", "title": "Agentic AI in Wind Energy Systems", "authors": "A. Hasan et al.", "year": "2026"}
          ]
        },
        {
          "name": "Research Methodology & Review",
          "size": 1,
          "papers": [
            {"doi": "10.1109/ACCESS.2026.3668138", "title": "A Systematic Literature Review of Agentic AI", "authors": "C. Moralles et al.", "year": "2026"}
          ]
        }
      ]
    };

    const TaxonomyDemo = () => {
      const [csvData, setCsvData] = useState(null);
      const [kValue, setKValue] = useState(5);
      const [taxonomy, setTaxonomy] = useState(null);
      const [loading, setLoading] = useState(false);
      const [selectedCluster, setSelectedCluster] = useState(null);
      const [hoveredNode, setHoveredNode] = useState(null);
      const svgRef = useRef(null);
      const fileInputRef = useRef(null);

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          const text = e.target.result;
          const lines = text.trim().split('\\n');
          
          const parseCSVLine = (line) => {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
              const char = line[i];
              if (char === '"') {
                inQuotes = !inQuotes;
              } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
              } else {
                current += char;
              }
            }
            result.push(current.trim());
            return result;
          };

          const headers = parseCSVLine(lines[0]);
          const data = lines.slice(1).map(line => {
            const values = parseCSVLine(line);
            const row = {};
            headers.forEach((header, i) => {
              row[header] = values[i] || '';
            });
            return row;
          }).filter(row => row.DOI && row.DOI.trim());

          setCsvData(data);
          setTaxonomy(null);
        };

        reader.readAsText(file);
      };

      const generateTaxonomy = () => {
        if (!csvData) return;
        
        setLoading(true);
        
        // Simulate processing with mock data
        setTimeout(() => {
          setTaxonomy(MOCK_TAXONOMY);
          setLoading(false);
        }, 1500);
      };

      useEffect(() => {
        if (!taxonomy || !svgRef.current) return;

        const width = 900;
        const height = 900;
        const radius = Math.min(width, height) / 2;

        d3.select(svgRef.current).selectAll('*').remove();

        const svg = d3.select(svgRef.current)
          .attr('width', width)
          .attr('height', height)
          .attr('viewBox', [-width / 2, -height / 2, width, height])
          .style('font-family', "'JetBrains Mono', monospace")
          .style('font-size', '12px');

        const root = d3.hierarchy(taxonomy)
          .sum(d => d.size || 0)
          .sort((a, b) => b.value - a.value);

        const partition = d3.partition().size([2 * Math.PI, radius]);
        partition(root);

        const colorScale = d3.scaleOrdinal()
          .domain(root.children ? root.children.map(d => d.data.name) : [])
          .range(['#FF6B9D', '#C44569', '#FEA47F', '#25CCF7', '#EAB543', '#55E6C1', '#CAD3C8', '#F97F51', '#1B9CFC', '#58B19F']);

        const arc = d3.arc()
          .startAngle(d => d.x0)
          .endAngle(d => d.x1)
          .padAngle(d => Math.min((d.x1 - d.x0) / 2, 0.005))
          .padRadius(radius / 2)
          .innerRadius(d => d.y0)
          .outerRadius(d => d.y1 - 2);

        const paths = svg.append('g')
          .selectAll('path')
          .data(root.descendants().filter(d => d.depth > 0))
          .join('path')
          .attr('d', arc)
          .attr('fill', d => {
            while (d.depth > 1) d = d.parent;
            return colorScale(d.data.name);
          })
          .attr('fill-opacity', d => d.depth === 1 ? 0.9 : 0.6)
          .attr('stroke', '#1a1a1a')
          .attr('stroke-width', 2)
          .style('cursor', 'pointer')
          .on('mouseover', function(event, d) {
            d3.select(this).attr('fill-opacity', 1).attr('stroke-width', 3).attr('stroke', '#FFD700');
            setHoveredNode(d);
          })
          .on('mouseout', function(event, d) {
            d3.select(this).attr('fill-opacity', d.depth === 1 ? 0.9 : 0.6).attr('stroke-width', 2).attr('stroke', '#1a1a1a');
            setHoveredNode(null);
          })
          .on('click', (event, d) => {
            if (d.depth === 1) setSelectedCluster(d.data);
          });

        svg.append('g')
          .selectAll('text')
          .data(root.descendants().filter(d => d.depth === 1))
          .join('text')
          .attr('transform', d => {
            const x = (d.x0 + d.x1) / 2 * 180 / Math.PI;
            const y = (d.y0 + d.y1) / 2;
            return `rotate(\${x - 90}) translate(\${y},0) rotate(\${x < 180 ? 0 : 180})`;
          })
          .attr('dy', '0.35em')
          .attr('text-anchor', 'middle')
          .attr('fill', '#ffffff')
          .attr('font-weight', 'bold')
          .attr('font-size', '13px')
          .attr('pointer-events', 'none')
          .text(d => {
            const name = d.data.name;
            return name.length > 25 ? name.substring(0, 22) + '...' : name;
          });

        svg.append('circle').attr('r', radius / 4).attr('fill', '#1a1a1a').attr('stroke', '#FFD700').attr('stroke-width', 4);
        svg.append('text').attr('text-anchor', 'middle').attr('dy', '-0.5em').attr('fill', '#FFD700').attr('font-size', '24px').attr('font-weight', 'bold').text('Research');
        svg.append('text').attr('text-anchor', 'middle').attr('dy', '1em').attr('fill', '#ffffff').attr('font-size', '18px').text('Taxonomy');

        paths.attr('opacity', 0).transition().duration(800).delay((d, i) => i * 20).attr('opacity', 1);

      }, [taxonomy]);

      const exportCluster = (cluster) => {
        if (!cluster || !cluster.papers) return;
        const headers = ['DOI', 'Title', 'Authors', 'Year'];
        const rows = cluster.papers.map(p => [p.doi, `"\${p.title.replace(/"/g, '""')}"`, `"\${p.authors.replace(/"/g, '""')}"`, p.year]);
        const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `\${cluster.name.replace(/[^a-z0-9]/gi, '_')}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const copyToClipboard = (cluster) => {
        if (!cluster || !cluster.papers) return;
        const text = cluster.papers.map(p => `\${p.title}\\nDOI: \${p.doi}\\nAuthors: \${p.authors}\\nYear: \${p.year}\\n`).join('\\n---\\n\\n');
        navigator.clipboard.writeText(text).then(() => alert('Papers copied to clipboard!'));
      };

      return (
        <div style={{minHeight: '100vh', background: 'linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%)', color: '#ffffff', fontFamily: "'Space Mono', monospace", padding: '2rem'}}>
          
          {/* Demo Banner */}
          <div style={{background: 'rgba(255, 165, 0, 0.2)', border: '2px solid #FFA500', borderRadius: '10px', padding: '1rem', marginBottom: '2rem', textAlign: 'center'}}>
            <strong style={{color: '#FFA500'}}>🎭 DEMO MODE</strong> - This is a standalone demo with mock data. For full functionality, set up the backend server (see README.md)
          </div>

          <div style={{textAlign: 'center', marginBottom: '3rem'}}>
            <h1 style={{fontSize: '4rem', fontWeight: '900', background: 'linear-gradient(90deg, #FFD700, #FFA500, #FF6B9D)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '0.5rem', letterSpacing: '-2px'}}>TAXONOMY ENGINE</h1>
            <p style={{fontSize: '1.2rem', color: '#888', letterSpacing: '4px', textTransform: 'uppercase'}}>AI-Powered Research Classification</p>
          </div>

          <div style={{maxWidth: '1200px', margin: '0 auto', background: 'rgba(255, 255, 255, 0.05)', backdropFilter: 'blur(10px)', border: '2px solid rgba(255, 215, 0, 0.3)', borderRadius: '20px', padding: '2rem', marginBottom: '2rem'}}>
            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '2rem', alignItems: 'end'}}>
              
              <div>
                <label style={{display: 'block', fontSize: '0.9rem', color: '#FFD700', marginBottom: '0.5rem', fontWeight: 'bold', letterSpacing: '1px'}}>📄 UPLOAD CSV</label>
                <input ref={fileInputRef} type="file" accept=".csv" onChange={handleFileUpload} style={{display: 'none'}} />
                <button onClick={() => fileInputRef.current.click()} style={{width: '100%', padding: '1rem', background: csvData ? 'rgba(0, 255, 0, 0.2)' : 'rgba(255, 215, 0, 0.2)', border: `2px solid \${csvData ? '#00ff00' : '#FFD700'}`, borderRadius: '10px', color: '#ffffff', fontSize: '1rem', cursor: 'pointer', fontFamily: 'inherit'}}>
                  {csvData ? `✓ \${csvData.length} Papers Loaded` : 'Choose CSV File'}
                </button>
              </div>

              <div>
                <label style={{display: 'block', fontSize: '0.9rem', color: '#FFD700', marginBottom: '0.5rem', fontWeight: 'bold', letterSpacing: '1px'}}>🎯 CLUSTERS: {kValue}</label>
                <input type="range" min="2" max="15" value={kValue} onChange={(e) => setKValue(parseInt(e.target.value))} style={{width: '100%', height: '8px', background: 'rgba(255, 215, 0, 0.3)', borderRadius: '5px', outline: 'none', cursor: 'pointer'}} />
                <div style={{display: 'flex', justifyContent: 'space-between', fontSize: '0.8rem', color: '#666', marginTop: '0.5rem'}}>
                  <span>2</span><span>15</span>
                </div>
              </div>

              <div>
                <button onClick={generateTaxonomy} disabled={!csvData || loading} style={{width: '100%', padding: '1rem', background: loading ? 'rgba(128, 128, 128, 0.3)' : 'linear-gradient(90deg, #FFD700, #FFA500)', border: 'none', borderRadius: '10px', color: '#000000', fontSize: '1.1rem', fontWeight: 'bold', cursor: loading || !csvData ? 'not-allowed' : 'pointer', fontFamily: 'inherit', letterSpacing: '1px', textTransform: 'uppercase'}}>
                  {loading ? '⚡ Processing...' : '🚀 Generate Taxonomy'}
                </button>
              </div>
            </div>
          </div>

          {taxonomy && (
            <div style={{maxWidth: '1200px', margin: '0 auto', display: 'grid', gridTemplateColumns: '900px 1fr', gap: '2rem'}}>
              
              <div style={{background: 'rgba(255, 255, 255, 0.05)', backdropFilter: 'blur(10px)', border: '2px solid rgba(255, 215, 0, 0.3)', borderRadius: '20px', padding: '2rem', display: 'flex', justifyContent: 'center', alignItems: 'center'}}>
                <svg ref={svgRef}></svg>
              </div>

              <div style={{background: 'rgba(255, 255, 255, 0.05)', backdropFilter: 'blur(10px)', border: '2px solid rgba(255, 215, 0, 0.3)', borderRadius: '20px', padding: '2rem', maxHeight: '900px', overflowY: 'auto'}}>
                <h2 style={{fontSize: '1.5rem', color: '#FFD700', marginBottom: '1rem', letterSpacing: '1px'}}>
                  {hoveredNode || selectedCluster ? '📊 CLUSTER DETAILS' : '💡 INSTRUCTIONS'}
                </h2>

                {!hoveredNode && !selectedCluster && (
                  <div style={{color: '#aaa', lineHeight: '1.8'}}>
                    <p style={{marginBottom: '1rem'}}><strong style={{color: '#FFD700'}}>Hover</strong> over any cluster segment to preview details</p>
                    <p style={{marginBottom: '1rem'}}><strong style={{color: '#FFD700'}}>Click</strong> a cluster to view full paper list</p>
                    <p><strong style={{color: '#FFD700'}}>Export</strong> clusters to CSV for further analysis</p>
                  </div>
                )}

                {(hoveredNode || selectedCluster) && (() => {
                  const cluster = selectedCluster || (hoveredNode?.depth === 1 ? hoveredNode.data : null);
                  if (!cluster) return null;

                  return (
                    <div>
                      <h3 style={{fontSize: '1.2rem', color: '#ffffff', marginBottom: '1rem', wordWrap: 'break-word'}}>{cluster.name}</h3>
                      
                      <div style={{display: 'flex', gap: '1rem', marginBottom: '1.5rem'}}>
                        <div style={{padding: '0.5rem 1rem', background: 'rgba(255, 215, 0, 0.2)', border: '2px solid #FFD700', borderRadius: '8px', fontSize: '0.9rem'}}>
                          📄 {cluster.size || cluster.papers?.length || 0} Papers
                        </div>
                        
                        {selectedCluster && (
                          <>
                            <button onClick={() => exportCluster(cluster)} style={{padding: '0.5rem 1rem', background: 'rgba(0, 255, 0, 0.2)', border: '2px solid #00ff00', borderRadius: '8px', color: '#ffffff', cursor: 'pointer', fontSize: '0.9rem', fontFamily: 'inherit'}}>💾 CSV</button>
                            <button onClick={() => copyToClipboard(cluster)} style={{padding: '0.5rem 1rem', background: 'rgba(0, 200, 255, 0.2)', border: '2px solid #00c8ff', borderRadius: '8px', color: '#ffffff', cursor: 'pointer', fontSize: '0.9rem', fontFamily: 'inherit'}}>📋 Copy</button>
                          </>
                        )}
                      </div>

                      {cluster.papers && (
                        <div style={{maxHeight: '600px', overflowY: 'auto'}}>
                          {cluster.papers.map((paper, idx) => (
                            <div key={idx} style={{padding: '1rem', background: 'rgba(255, 255, 255, 0.05)', border: '1px solid rgba(255, 215, 0, 0.2)', borderRadius: '10px', marginBottom: '1rem'}}>
                              <div style={{fontSize: '0.9rem', color: '#ffffff', fontWeight: 'bold', marginBottom: '0.5rem', lineHeight: '1.4'}}>{paper.title}</div>
                              <div style={{fontSize: '0.8rem', color: '#888', marginBottom: '0.3rem'}}>{paper.authors}</div>
                              <div style={{fontSize: '0.75rem', color: '#666'}}>DOI: {paper.doi} | Year: {paper.year}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            </div>
          )}

          <div style={{textAlign: 'center', marginTop: '3rem', padding: '2rem', borderTop: '2px solid rgba(255, 215, 0, 0.2)', color: '#666', fontSize: '0.9rem'}}>
            <p>Powered by Sentence Transformers • K-Means Clustering • Claude AI</p>
            <p style={{marginTop: '0.5rem'}}>Built with React & D3.js</p>
          </div>

          <style>{`
            ::-webkit-scrollbar { width: 10px; height: 10px; }
            ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 5px; }
            ::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.5); border-radius: 5px; }
            ::-webkit-scrollbar-thumb:hover { background: rgba(255, 215, 0, 0.7); }
          `}</style>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TaxonomyDemo />);
  </script>
</body>
</html>
